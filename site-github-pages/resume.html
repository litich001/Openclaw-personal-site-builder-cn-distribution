<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>李哲简历预览</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09111d;
        --panel: rgba(17, 26, 45, 0.92);
        --line: rgba(255,255,255,0.1);
        --text: #f5f7fb;
        --muted: #b7c3d8;
        --accent: #89e6cf;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 10%, rgba(137,230,207,0.16), transparent 20%), linear-gradient(180deg, #081120, #101827);
      }
      .wrap {
        width: min(1080px, calc(100% - 24px));
        margin: 0 auto;
        padding: 24px 0 32px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
      }
      .title h1 { margin: 0; font-size: clamp(1.2rem, 2vw, 1.8rem); }
      .title p { margin: 6px 0 0; color: var(--muted); font-size: 0.95rem; }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        text-decoration: none;
        color: var(--text);
        background: rgba(255,255,255,0.05);
        font-weight: 700;
        cursor: pointer;
      }
      .button-primary { color: #08111c; background: linear-gradient(135deg, var(--accent), #fff2da); }
      .viewer {
        width: 100%;
        min-height: calc(100vh - 140px);
        border: 1px solid var(--line);
        border-radius: 24px;
        overflow: hidden;
        background: var(--panel);
        box-shadow: 0 18px 42px rgba(0,0,0,0.28);
      }
      iframe { width: 100%; height: calc(100vh - 140px); border: 0; background: #fff; }
      .hint { margin-top: 12px; color: var(--muted); font-size: 0.9rem; }
      @media (max-width: 640px) {
        .wrap { width: calc(100% - 16px); padding-top: 14px; }
        .topbar { flex-direction: column; align-items: stretch; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; }
        .viewer, iframe { min-height: calc(100vh - 236px); height: calc(100vh - 236px); border-radius: 18px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="title">
          <h1>李哲简历预览</h1>
          <p>先预览，再下载。若手机浏览器不支持直接下载，会调起系统分享或新开 PDF。</p>
        </div>
        <div class="actions">
          <a class="button" href="./assets/lizhe-resume.pdf" target="_blank" rel="noopener">打开 PDF</a>
          <button class="button button-primary" id="downloadResume" type="button">下载 PDF</button>
        </div>
      </div>
      <div class="viewer">
        <iframe src="./assets/lizhe-resume.pdf#view=FitH" title="李哲简历 PDF 预览"></iframe>
      </div>
      <p class="hint" id="downloadHint"></p>
    </div>
    <script>
      const downloadButton = document.getElementById('downloadResume');
      const hint = document.getElementById('downloadHint');
      const resumeUrl = './assets/lizhe-resume.pdf';

      const setHint = (text) => {
        if (hint) hint.textContent = text;
      };

      downloadButton?.addEventListener('click', async () => {
        setHint('正在准备下载...');
        try {
          const response = await fetch(resumeUrl, { credentials: 'same-origin' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const blob = await response.blob();
          const file = new File([blob], 'lizhe-resume.pdf', { type: 'application/pdf' });

          if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
            await navigator.share({ files: [file], title: '李哲简历' });
            setHint('已调起系统分享/保存面板。');
            return;
          }

          const objectUrl = URL.createObjectURL(blob);
          const anchor = document.createElement('a');
          anchor.href = objectUrl;
          anchor.download = 'lizhe-resume.pdf';
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          window.setTimeout(() => URL.revokeObjectURL(objectUrl), 1500);
          setHint('已触发下载。如果浏览器拦截，请点“打开 PDF”后使用系统保存。');
        } catch (error) {
          setHint('当前浏览器阻止了直接下载，已为你打开 PDF。');
          window.open(resumeUrl, '_blank', 'noopener');
        }
      });
    </script>
  </body>
</html>
